    <!--
      Meta Pixel: `vite dev` injecta LOAD=false (sem fbevents.js); `vite build` injecta true. CSP/eval no Issues: hosting ou extensão.
      ERR_BLOCKED_BY_CLIENT / falta fbevents: bloqueador ou modo estrito. "Receiving end does not exist": extensão.
    -->
    <script>
    (function(){
      var LOAD_META_PIXEL = __ROYAL_LOAD_META_PIXEL__;
      if (!LOAD_META_PIXEL) return;
      /* Substituído em vite.config (plugin html-meta-pixel-id); fallback no JS se intacto. */
      var envPixel = String('__ROYAL_META_PIXEL_ID__').trim();
      var PIXEL_ID = /^\d{10,20}$/.test(envPixel) ? envPixel : '706054019233816';
      function bootMetaPixel(){
        try {
          if (window.fbq) return;
          !function(f,b,e,v,n,t,s){
            if (f.fbq) return;
            n = f.fbq = function(){
              n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
            };
            if (!f._fbq) f._fbq = n;
            n.push = n;
            n.loaded = !0;
            n.version = '2.0';
            n.queue = [];
            t = b.createElement(e);
            t.async = !0;
            t.src = v;
            t.onerror = function(){ try { f.__fbPixelLoadFailed = !0; } catch (e) {} };
            s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s);
          }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
          fbq('set', 'autoConfig', false, PIXEL_ID);
          fbq('init', PIXEL_ID);
          /* Um único init vem daqui; metaPixel.ts não volta a chamar fbq('init') (evita Duplicate Pixel ID). */
          try { window.__ROYAL_META_HEAD_INIT__ = true; } catch (e) {}
          /* SPA: PageView automático da Meta desativado; navegações disparam em RouteTracker.trackSpaPageView */
          try { fbq.disablePushState = true; } catch (e) {}
          try { fbq('track', 'PageView'); } catch (e) {}
          /* Conversões: InitiateCheckout + Purchase (metaPixel.ts) + CAPI (server-relay) */
        } catch (e) { /* Pixel opcional: não quebrar a página */ }
      }
      function schedule(){
        var ric = window.requestIdleCallback;
        if (ric) ric(bootMetaPixel, { timeout: 4000 });
        else setTimeout(bootMetaPixel, 1);
      }
      if (document.readyState === 'complete') schedule();
      else window.addEventListener('load', schedule);
    })();
    </script>

    <!-- Click ID Tracker: captura fbclid, gclid, ttclid e UTMs + sets _fbc cookie -->
    <script>
      (function(){
        try {
          var params = new URLSearchParams(window.location.search);
          var clickIds = ['fbclid','gclid','ttclid','sck','utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
          clickIds.forEach(function(key){
            var val = params.get(key);
            if(val) {
              try { localStorage.setItem(key, val); } catch(e){}
              try { sessionStorage.setItem('_ck_'+key, val); } catch(e){}
            }
          });
          // Set _fbc cookie from fbclid so Meta Pixel can read it
          var fbclid = params.get('fbclid');
          if(fbclid) {
            var fbc = 'fb.1.' + Date.now() + '.' + fbclid;
            var expires = new Date(Date.now() + 90*86400000).toUTCString();
            document.cookie = '_fbc=' + fbc + '; path=/; expires=' + expires + '; SameSite=Lax; Secure';
          }
        } catch(e){}
      })();
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- UTM Keeper: preserva UTMs na navegação -->
    <script>
      (function(){
        try {
          var utmKeys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','fbclid','sck'];
          var stored = {};
          utmKeys.forEach(function(key){
            var val = sessionStorage.getItem('_ck_'+key) || localStorage.getItem(key);
            if(val) stored[key] = val;
          });
          document.addEventListener('click', function(e){
            var link = e.target.closest('a[href]');
            if(!link || link.hostname !== window.location.hostname) return;
            try {
              var url = new URL(link.href);
              var changed = false;
              Object.keys(stored).forEach(function(key){
                if(!url.searchParams.has(key)){
                  url.searchParams.set(key, stored[key]);
                  changed = true;
                }
              });
              if(changed) link.href = url.toString();
            } catch(e){}
          });
        } catch(e){}
      })();
    </script>
  </body>
