version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 18
  - Vite 5
  - Tailwind CSS
  - shadcn/ui (Radix)
  - Supabase (auth, database, edge functions)
  - Framer Motion
  - React Router v6
  - React Query (TanStack)
  - Recharts
  - Vitest
features:
  - name: Landing Page
    description: Main homepage with hero section, featured products, Valorant accounts, reviews, FAQ, how-it-works, and CTA
    files:
      - src/pages/Index.tsx
      - src/components/landing/ReviewsSection.tsx
      - src/components/landing/FaqSection.tsx
      - src/components/landing/HowItWorksSection.tsx
      - src/components/landing/CtaSection.tsx
      - src/components/landing/Footer.tsx
      - src/components/landing/FloatingWidgets.tsx
      - src/components/landing/StickyMobileCTA.tsx
    endpoints: []
    depends_on: []
  - name: Authentication
    description: User authentication with email/password, Discord OAuth, password reset, and session management via Supabase Auth
    files:
      - src/hooks/useAuth.tsx
      - src/components/AuthModal.tsx
      - src/pages/ResetPassword.tsx
    endpoints:
      - method: POST
        path: /auth/v1/signup
        description: Register new user with email, password, and username
        auth_required: false
        response_schema:
          "200": User session
          "400": Validation error
      - method: POST
        path: /auth/v1/token
        description: Sign in with email and password
        auth_required: false
        response_schema:
          "200": User session
          "400": Invalid credentials
      - method: POST
        path: /auth/v1/recover
        description: Send password reset email
        auth_required: false
        response_schema:
          "200": Success
    depends_on: []
  - name: Product Catalog
    description: Browse and view products (cheats/software) with plans and pricing
    files:
      - src/pages/Produtos.tsx
      - src/pages/ProdutoDetalhes.tsx
    endpoints:
      - method: GET
        path: /rest/v1/products
        description: List all active products with plans
        auth_required: false
        response_schema:
          "200": Product[]
    depends_on:
      - Authentication
  - name: Game Accounts Marketplace
    description: Browse and view game accounts from LZT Market integration for Valorant, LoL, Fortnite, Minecraft
    files:
      - src/pages/Contas.tsx
      - src/pages/ContaDetalhes.tsx
      - src/pages/LolDetalhes.tsx
      - src/pages/FortniteDetalhes.tsx
      - src/pages/MinecraftDetalhes.tsx
      - src/hooks/useLztMarkup.tsx
    endpoints:
      - method: GET
        path: /functions/v1/lzt-market
        description: Fetch game accounts from LZT Market
        auth_required: false
        response_schema:
          "200": LztItem[]
    depends_on:
      - Authentication
  - name: Shopping Cart
    description: Client-side cart with localStorage persistence, auth requirement, and direct checkout model
    files:
      - src/hooks/useCart.tsx
    endpoints: []
    depends_on:
      - Authentication
  - name: Checkout and Payments
    description: Multi-method payment flow supporting PIX, credit card, and USDT crypto with auto-polling status
    files:
      - src/pages/Checkout.tsx
    endpoints:
      - method: POST
        path: /functions/v1/pix-payment?action=create
        description: Create PIX payment charge
        auth_required: true
        request_schema:
          body:
            cart_snapshot: CartItem[]
            coupon_id: string
        response_schema:
          "200": PaymentCharge
          "400": Error
      - method: POST
        path: /functions/v1/pix-payment?action=create-card
        description: Create card payment charge
        auth_required: true
        response_schema:
          "200": CardPaymentUrl
      - method: POST
        path: /functions/v1/pix-payment?action=create-crypto
        description: Create USDT crypto payment charge
        auth_required: true
        response_schema:
          "200": CryptoPayment
      - method: GET
        path: /functions/v1/pix-payment?action=status
        description: Poll payment status
        auth_required: true
        response_schema:
          "200": PaymentStatus
    depends_on:
      - Authentication
      - Shopping Cart
  - name: User Dashboard
    description: Tabbed dashboard with overview stats, purchases list, security settings, and account settings
    files:
      - src/pages/Dashboard.tsx
    endpoints:
      - method: GET
        path: /rest/v1/order_tickets
        description: Fetch user order tickets
        auth_required: true
        response_schema:
          "200": Ticket[]
      - method: GET
        path: /rest/v1/payments
        description: Fetch user payment history
        auth_required: true
        response_schema:
          "200": Payment[]
    depends_on:
      - Authentication
  - name: Order Management
    description: View orders with filters and detailed order chat with audio message support
    files:
      - src/pages/MeusPedidos.tsx
      - src/pages/PedidoChat.tsx
      - src/hooks/useAudioRecorder.tsx
    endpoints: []
    depends_on:
      - Authentication
      - User Dashboard
  - name: Scratch Card Game
    description: Gamified scratch card with PIX payment, canvas-based scratch interaction, server-side win determination
    files:
      - src/pages/Raspadinha.tsx
    endpoints:
      - method: POST
        path: /functions/v1/scratch-card-play
        description: Process scratch card play server-side
        auth_required: true
        response_schema:
          "200": ScratchResult
    depends_on:
      - Authentication
      - Checkout and Payments
  - name: Reviews
    description: Customer reviews and ratings page
    files:
      - src/pages/Avaliacoes.tsx
      - src/components/landing/ReviewsSection.tsx
      - src/components/landing/reviewsData.ts
    endpoints: []
    depends_on: []
  - name: Product Status
    description: Product and service availability status page
    files:
      - src/pages/Status.tsx
    endpoints: []
    depends_on: []
  - name: Admin Panel
    description: Full admin dashboard with 16 management modules protected by server-side role verification
    files:
      - src/pages/AdminPanel.tsx
      - src/components/AdminGuard.tsx
      - src/components/admin/OverviewTab.tsx
      - src/components/admin/ProductsTab.tsx
      - src/components/admin/StockTab.tsx
      - src/components/admin/GamesTab.tsx
      - src/components/admin/SalesTab.tsx
      - src/components/admin/TicketsTab.tsx
      - src/components/admin/PaymentsTab.tsx
      - src/components/admin/FinanceTab.tsx
      - src/components/admin/CouponsTab.tsx
      - src/components/admin/UsersTab.tsx
      - src/components/admin/ResellersTab.tsx
      - src/components/admin/CredentialsTab.tsx
      - src/components/admin/LztTab.tsx
      - src/components/admin/RobotProjectTab.tsx
      - src/components/admin/ScratchCardTab.tsx
      - src/components/admin/StatusTab.tsx
    endpoints:
      - method: POST
        path: /rest/v1/rpc/has_role
        description: Verify admin role server-side
        auth_required: true
        response_schema:
          "200": boolean
    depends_on:
      - Authentication
  - name: Legal Pages
    description: Terms of use, privacy policy, refund policy, warranty, and help center
    files:
      - src/pages/TermosDeUso.tsx
      - src/pages/PoliticaPrivacidade.tsx
      - src/pages/PoliticaReembolso.tsx
      - src/pages/Garantia.tsx
      - src/pages/CentralAjuda.tsx
    endpoints: []
    depends_on: []
  - name: Navigation and Header
    description: Main header with navigation, auth modal trigger, cart indicator, and user menu
    files:
      - src/components/Header.tsx
      - src/components/DiscordBanner.tsx
    endpoints: []
    depends_on:
      - Authentication
      - Shopping Cart
  - name: Meta Pixel and Analytics
    description: Facebook Meta Pixel tracking with purchase events, advanced matching, click ID tracking, and UTM preservation
    files:
      - src/lib/metaPixel.ts
      - index.html
    endpoints: []
    depends_on: []
known_limitations:
  - issue: Cloudflare Turnstile captcha is disabled for debugging
    location: src/components/AuthModal.tsx
    impact: No bot protection on login/register forms
  - issue: Cart uses direct checkout model replacing items instead of accumulating
    location: src/hooks/useCart.tsx
    impact: User can only purchase one item at a time
