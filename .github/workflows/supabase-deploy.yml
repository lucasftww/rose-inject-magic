# Deploy Edge Functions + opcionalmente `supabase db push`.
#
# Secrets (GitHub → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — obrigatório (Personal Access Token sbp_... em
#       https://supabase.com/dashboard/account/tokens ). Se o job falhar em
#       poucos segundos, quase sempre é: secret em falta, token revogado, ou
#       token guardado com espaços a mais.
#   SUPABASE_DB_PASSWORD   — opcional; se não existir, o passo de migrações é ignorado
#
# Se o histórico remoto estiver desalinhado, corre uma vez localmente:
#   npm run supabase:repair-migrations && npx supabase db push --yes

name: Supabase deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "scripts/deploy-edge-functions.mjs"
      - ".github/workflows/supabase-deploy.yml"

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Functions + DB
    runs-on: ubuntu-latest
    env:
      # Alinha com a transição dos runners GitHub para Node 24 (changelog Actions 2025–2026).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Verify SUPABASE_ACCESS_TOKEN
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Define o secret SUPABASE_ACCESS_TOKEN neste repositório (Settings → Secrets and variables → Actions). Cria um token em https://supabase.com/dashboard/account/tokens e cola o valor completo (começa por sbp_)."
            exit 1
          fi
          echo "SUPABASE_ACCESS_TOKEN is present."

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DEPLOY_QUIET_GO_DEBUG: "1"
        run: npm run deploy:supabase-functions

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Project ref from config.toml
        id: cfg
        run: |
          ref=$(grep -E '^project_id\s*=' supabase/config.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "project_ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Push DB migrations (optional)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -e
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::notice title=DB migrations::SUPABASE_DB_PASSWORD not set; skipping supabase db push. Add the secret to enable migrations in CI."
            exit 0
          fi
          supabase link --project-ref "${{ steps.cfg.outputs.project_ref }}" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --yes
