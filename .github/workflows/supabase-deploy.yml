# Deploy Edge Functions + opcionalmente `supabase db push`.
#
# Secrets (GitHub → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — obrigatório para deploy das functions
#   SUPABASE_DB_PASSWORD   — opcional; se não existir, o passo de migrações é ignorado
#
# Se o histórico remoto estiver desalinhado, corre uma vez localmente:
#   npm run supabase:repair-migrations && npx supabase db push --yes

name: Supabase deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "scripts/deploy-edge-functions.mjs"
      - ".github/workflows/supabase-deploy.yml"

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Functions + DB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DEPLOY_QUIET_GO_DEBUG: "1"
        run: npm run deploy:supabase-functions

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Project ref from config.toml
        id: cfg
        run: |
          ref=$(grep -E '^project_id\s*=' supabase/config.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "project_ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Push DB migrations (optional)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -e
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::notice title=DB migrations::SUPABASE_DB_PASSWORD not set; skipping supabase db push. Add the secret to enable migrations in CI."
            exit 0
          fi
          supabase link --project-ref "${{ steps.cfg.outputs.project_ref }}" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --yes
