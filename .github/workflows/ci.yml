# Frontend: typecheck, lint, knip, tests, production build (sem secrets).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      # Build de produção precisa de URL/chave públicas (anon); alinhar a client.ts DEV_FALLBACK_*.
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Check
